name: Bug Report
description: 'Please include trace logs with every report. Only the current stable (main) and current dev builds are actively supported.'
labels: ['bug', 'needs-triage']
body:
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: Please search open and closed issues before opening a new one.
    options:
    - label: I have searched the existing open and closed issues
      required: true
- type: dropdown
  attributes:
    label: What area of Sportarr does this bug affect?
    options:
      - IPTV / DVR / Recordings
      - Calendar / Metadata / Event times
      - Search / Indexers / Releases
      - Downloads / Import / File management
      - UI / Frontend
      - Plugins (Jellyfin / Emby / Plex)
      - Settings / Backup / Other
  validations:
    required: true
- type: textarea
  attributes:
    label: Current Behavior
    description: A concise description of what you're experiencing.
  validations:
    required: true
- type: textarea
  attributes:
    label: Expected Behavior
    description: A concise description of what you expected to happen.
  validations:
    required: true
- type: textarea
  attributes:
    label: Steps To Reproduce
    placeholder: |
      1. In this environment...
      2. With this config...
      3. Run '...'
      4. See error...
  validations:
    required: false
- type: textarea
  attributes:
    label: Environment
    description: |
      Examples:
        - OS: Ubuntu 22.04
        - Sportarr: 4.0.1004.1083
        - Install method: Docker
        - Reverse proxy: No
        - Container/Host timezone: America/New_York
        - Browser: Firefox 90 (if UI-related)
    value: |
        - OS:
        - Sportarr:
        - Install method:
        - Reverse proxy:
        - Container/Host timezone:
        - Browser:
    render: markdown
  validations:
    required: true
- type: dropdown
  attributes:
    label: What branch are you running?
    options:
      - Main (stable)
      - Dev (rolling pre-release)
      - Custom build (local source)
  validations:
    required: true
- type: textarea
  attributes:
    label: Trace Logs?
    description: |
      ***Most bug reports need trace logs to be diagnosable. Info-level logs usually don't have enough detail.***

      How to capture trace logs:
      1. In Sportarr, open Settings → General → Logging and set **Log Level** to **Trace**.
      2. Reproduce the issue you are reporting.
      3. Attach the most recent `sportarr.txt` (or `sportarrYYYYMMDD.txt` / `sportarr_NNN.txt` if it has rolled) from your Sportarr data folder's `logs/` directory, or paste the relevant lines below. All log levels — including Trace — are written to that single file; there is no separate trace-only file.
      4. Set Log Level back to Info once you are done — Trace is verbose and not meant for everyday use.
  validations:
    required: true
- type: textarea
  attributes:
    label: Anything else?
    description: |
      Links? Screenshots? References? Anything that will give us more context.
      Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
  validations:
    required: false
